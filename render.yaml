services:
  - type: web
    name: the-floor
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FLOOR_DEBATE_MS
        value: 90000
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: SEC_USER_AGENT
        value: The Floor contact@example.com
      - key: MAX_FOLLOWUPS_PER_SESSION
        value: 8
      - key: MAX_FOLLOWUP_BODY_BYTES
        value: 8192
